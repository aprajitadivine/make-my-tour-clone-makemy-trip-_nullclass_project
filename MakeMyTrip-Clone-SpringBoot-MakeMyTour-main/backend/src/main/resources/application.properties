# ============================================================
# MakeMyTour - Application Configuration
# ============================================================

# Server
# Render (and most PaaS platforms) injects a PORT environment variable.
# The default of 8080 is used for local development.
server.port=${PORT:8080}
spring.application.name=makemytour-backend

# ============================================================
# H2 File-Based Database (data survives backend restarts)
# The database is stored under ./data/ relative to the working directory.
# To switch to MySQL/PostgreSQL, comment out the H2 section and
# uncomment the corresponding section below.
# ============================================================
spring.datasource.url=jdbc:h2:mem:makemytourdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# PostgreSQL (production-recommended — comment out H2 section above first)
# Set DATABASE_URL on Render / Railway / Heroku, e.g.:
#   DATABASE_URL=jdbc:postgresql://<host>:<port>/<db>?user=<user>&password=<pw>
#
# spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/makemytourdb}
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=${DB_USERNAME:postgres}
# spring.datasource.password=${DB_PASSWORD:}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ============================================================

# JPA / Hibernate
# create-drop: schema is created on startup and dropped on shutdown — correct for
# in-memory H2 because it guarantees a clean state on every boot and avoids schema
# drift.  Switch to 'validate' or 'none' when using a persistent database.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Security Configuration
# ============================================================
# SECURITY NOTE: In production, override this via the environment variable
#   JWT_SECRET=<your-strong-256-bit-secret>
# or a secrets manager (AWS Secrets Manager, HashiCorp Vault, etc.).
# Never commit production secrets to source control.
# In production, set the JWT_SECRET environment variable to a
# strong random 256-bit (32-char+) secret.
# Example (Render / Railway / Heroku):  JWT_SECRET=<generated-secret>
jwt.secret=${JWT_SECRET:MakeMyTourSuperSecretKeyForJWTTokenGeneration2024MustBeLongEnough}
jwt.expiration=86400000

# ============================================================
# CORS Configuration
# ============================================================
# In production, set CORS_ALLOWED_ORIGINS to your Netlify URL, e.g.:
#   CORS_ALLOWED_ORIGINS=https://make-my-trip-clone-makemytour.netlify.app
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================================================
# copilot/use-clerk-for-authentication
# Spring Mail (SMTP) – required for password-reset emails
# ============================================================
# Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD via environment
# variables or a secrets manager.  Never commit real credentials.
#
# Gmail example:
#   MAIL_HOST=smtp.gmail.com
#   MAIL_PORT=587
#   MAIL_USERNAME=yourapp@gmail.com
#   MAIL_PASSWORD=<16-char Google App Password>
#
# Other providers (Mailgun, SendGrid, AWS SES, etc.) work the same way –
# just swap the host/port and credentials.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Sender name shown in the "From" field
app.mail.from=${MAIL_FROM:MakeMyTour <no-reply@makemytour.com>}

# ============================================================
# Frontend URL – used in password-reset e-mail links
# ============================================================
# In production set FRONTEND_URL=https://your-netlify-app.netlify.app
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
# Razorpay Payment Gateway
# ============================================================
# Set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET as environment variables.
# For local development, copy .env.example to .env.local (frontend) and set the
# variables in your shell or IDE run configuration.
# NEVER hardcode credentials in this file.
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}

# ============================================================
# Sample / Demo Seed User Credentials
# ============================================================
# These are the default passwords used by DataInitializer to seed demo users
# (admin, alice, bob) on first startup with an empty database.
# They are intentionally simple for local development convenience.
#
# Override via environment variables before deploying to any shared environment:
#   SEED_ADMIN_PASSWORD=<strong-password>
#   SEED_ALICE_PASSWORD=<strong-password>
#   SEED_BOB_PASSWORD=<strong-password>
#
# The values are hashed with BCrypt before being stored — they are never
# written to the database in plain text.
app.seed.admin.password=${SEED_ADMIN_PASSWORD:admin-demo-pass}
app.seed.alice.password=${SEED_ALICE_PASSWORD:alice-demo-pass}
app.seed.bob.password=${SEED_BOB_PASSWORD:bob-demo-pass}

# ============================================================
# Logging
# ============================================================
logging.level.com.makemytour=INFO
logging.level.org.springframework.security=WARN
